# This workflow is triggered on push to the main branch and deploys the Strapi application on a self-hosted runner.

name: Deploy Strapi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stop Strapi (Port 1338)
        shell: cmd
        run: |
          @echo off
          for /f "tokens=5" %%a in ('netstat -aon ^| findstr :1338 ^| findstr LISTENING 2^>nul') do (
            echo Killing Strapi PID on Port 1338: %%a
            taskkill /F /PID %%a /T 2>nul
          )
          timeout /t 3 /nobreak >nul || exit 0

      - name: Hardened Sync & Cleanup
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          git fetch origin
          git reset --hard origin/main
          @echo off
          echo "Wiping node_modules to ensure 100%% clean install..."
          if exist node_modules rmdir /s /q node_modules 2>nul
          if exist .git\index.lock del .git\index.lock 2>nul

      - name: Install dependencies
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          npm install

      - name: Build Strapi
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          npm run build

      - name: Start Strapi
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          start "STRAPI_BENCHMARK" cmd /c "title STRAPI_BENCHMARK && npm run start"