name: Deploy Strapi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Update project
        run: |
          cd C:\A_Benchmark\benchmark_be\benchmark
          git pull origin main

      - name: Install packages
        run: |
          cd C:\A_Benchmark\benchmark_be\benchmark
          cmd /c "C:\nvm4w\nodejs\npm.cmd install"

      - name: Restart Strapi
        run: |
          taskkill /FI "WINDOWTITLE eq STRAPI_BENCHMARK" /F
          start "STRAPI_BENCHMARK" cmd /k "cd C:\A_Benchmark\benchmark_be\benchmark && C:\nvm4w\nodejs\npm.cmd run develop"