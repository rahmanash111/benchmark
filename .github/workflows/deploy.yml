# This workflow is triggered on push to the main branch and deploys the Strapi application on a self-hosted runner.

name: Deploy Strapi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Surgical Stop Strapi (Unlock Files)
        shell: powershell
        run: |
          $projectPath = "C:\A_Benchmark\benchmark_be\benchmark"
          Write-Host "Searching for processes in $projectPath ..."
          $processes = Get-CimInstance Win32_Process | Where-Object { $_.CommandLine -like "*$projectPath*" -and $_.Name -ne "powershell.exe" }
          if ($processes) {
              foreach ($p in $processes) {
                  Write-Host "Killing process: $($p.Name) (PID: $($p.ProcessId))"
                  Stop-Process -Id $p.ProcessId -Force -ErrorAction SilentlyContinue
              }
          } else {
              Write-Host "No processes found for this project."
          }
          Start-Sleep -s 2 # Give Windows a moment to release file locks

      - name: Update project code
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          git fetch origin
          git reset --hard origin/main

      - name: Install dependencies
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          npm install

      - name: Build Strapi
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          npm run build

      - name: Start Strapi
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          start "STRAPI_BENCHMARK" cmd /c "title STRAPI_BENCHMARK && npm run start"