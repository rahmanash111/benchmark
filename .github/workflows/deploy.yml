# This workflow is triggered on push to the main branch and deploys the Strapi application on a self-hosted runner.

name: Deploy Strapi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Surgical Stop Strapi (Unlock Files)
        shell: cmd
        run: |
          @echo off
          for /f "tokens=2 delims=," %%a in ('wmic process where "CommandLine like '%%C:\\A_Benchmark\\%%'" get ProcessId /format:csv 2^>nul ^| findstr /r [0-9]') do (
            echo Killing Strapi PID: %%a
            taskkill /F /PID %%a /T 2>nul
          )
          timeout /t 2 /nobreak >nul || exit 0

      - name: Update project code
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          git fetch origin
          git reset --hard origin/main

      - name: Install dependencies
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          npm install

      - name: Build Strapi
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          npm run build

      - name: Start Strapi
        shell: cmd
        run: |
          cd /d C:\A_Benchmark\benchmark_be\benchmark
          start "STRAPI_BENCHMARK" cmd /c "title STRAPI_BENCHMARK && npm run start"