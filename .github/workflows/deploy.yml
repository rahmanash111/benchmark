# This workflow is triggered on push to the main branch and deploys the Strapi application on a self-hosted runner.

name: Deploy Strapi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Strapi
        run: npm run build

      - name: Restart Strapi
        shell: cmd
        run: |
          taskkill /F /FI "WINDOWTITLE eq STRAPI_BENCHMARK" /T 2>nul || exit 0
          start "STRAPI_BENCHMARK" cmd /c "title STRAPI_BENCHMARK && npm run start"