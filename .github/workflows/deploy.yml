# This workflow is triggered on push to the main branch and deploys the Strapi application on a self-hosted runner. and also the npm install is not added in the workflow, you may want to add it before restarting Strapi to ensure that all dependencies are up to date. Here's an updated version of the workflow with the npm install step included:

name: Deploy Strapi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Update project
        shell: cmd
        run: |
          cd C:\A_Benchmark\benchmark_be\benchmark
          git pull origin main

      - name: Restart Strapi
        shell: cmd
        run: |
          taskkill /FI "WINDOWTITLE eq STRAPI_BENCHMARK" /F
          start "STRAPI_BENCHMARK" cmd /k "cd C:\A_Benchmark\benchmark_be\benchmark && C:\Users\direc\AppData\Local\nvm\v20.20.1\npm.cmd run develop"